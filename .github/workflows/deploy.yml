name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: astro-site

      - name: Run tests
        run: npm test
        working-directory: astro-site

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: astro-site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: astro-site

      - name: Build
        run: npm run build
        working-directory: astro-site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy astro-site/dist --project-name=svg2img

      - name: Notify IndexNow
        if: success()
        continue-on-error: true
        run: |
          curl -s -X POST https://api.indexnow.org/indexnow \
            -H "Content-Type: application/json" \
            -d '{
              "host": "svg2img.shanqiao.app",
              "key": "${{ secrets.INDEXNOW_KEY }}",
              "urlList": [
                "https://svg2img.shanqiao.app/zh/",
                "https://svg2img.shanqiao.app/en/",
                "https://svg2img.shanqiao.app/zh/privacy/",
                "https://svg2img.shanqiao.app/en/privacy/"
              ]
            }'
